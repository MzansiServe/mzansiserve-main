version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mzansiserve}
      POSTGRES_USER: ${POSTGRES_USER:-mzansi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mzansi} -d ${POSTGRES_DB:-mzansiserve}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "5000" # Internal only — nginx proxies this
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-mzansi}:${DB_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-mzansiserve}
      POSTGRES_USER: ${POSTGRES_USER:-mzansi}
      POSTGRES_DB: ${POSTGRES_DB:-mzansiserve}
      # Flask
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-key}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      # Gunicorn
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@mzansiserve.co.za}
      # External services
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      YOCO_SECRET_KEY: ${YOCO_SECRET_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./static:/app/static
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "8080"          # Internal only — nginx proxies this
    environment:
      # IMPORTANT: VITE_API_URL is the PUBLIC address so the *browser* can reach the API.
      # We now route /api/ through Nginx on port 80, so no port is needed.
      - VITE_API_URL=http://${PUBLIC_IP:-localhost}:5006
    depends_on:
      - app
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    entrypoint: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    ports:
      - "80:80"       # Frontend (Vite) — main entry point
      - "5006:5006"   # Backend API (Flask)
    volumes:
      - ./nginx_dir/new/nginx.docker.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
