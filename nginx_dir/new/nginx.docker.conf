events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # ── Upstreams (Docker internal DNS) ─────────────────────────────────
    upstream flask_app {
        server app:5000;
    }

    upstream vite_frontend {
        server frontend:8080;
    }

    # ── Port 80 → Redirect to HTTPS ───────────────────────────────────
    server {
        listen 80 default_server;
        server_name mzansiserve.co.za;
        return 301 https://$host$request_uri;
    }

    # ── Port 443 → HTTPS ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name mzansiserve.co.za;

        ssl_certificate     /etc/letsencrypt/live/mzansiserve.co.za/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mzansiserve.co.za/privkey.pem;

        # SSL optimization
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 100M;

        # ── Backend API routes → Flask ────────────────────────────────
        location /api/ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ── Static assets ────────────────────────────────────────────
        location ^~ /static/ {
            root /app;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
 
        # ── Uploaded files ───────────────────────────────────────────
        location ^~ /uploads/ {
            root /app;
            expires 7d;
        }

        # ── Everything else → Vite frontend ──────────────────────────
        location / {
            proxy_pass         http://vite_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ── Port 5006 → Flask backend API ────────────────────────────────
    server {
        listen 5006;
        server_name _;

        add_header X-Frame-Options      "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"  always;

        client_max_body_size 100M;

        location /static/ {
            alias   /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /uploads/ {
            alias   /app/uploads/;
            expires 7d;
        }

        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      16 8k;
        }
    }
}
