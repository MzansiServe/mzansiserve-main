events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # ── Upstreams (Docker internal DNS) ─────────────────────────────────
    upstream flask_app {
        server app:5000;
    }

    upstream vite_frontend {
        server frontend:8080;
    }

    # ── Port 80 → API to Flask, everything else to Vite frontend ─────
    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 100M;

        # ── Backend API routes → Flask ────────────────────────────────
        location /api/ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      16 8k;
        }

        # ── Static files → Flask ──────────────────────────────────────
        location /static/ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Uploaded files → Flask ────────────────────────────────────
        location /uploads/ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Everything else → Vite frontend ──────────────────────────
        location / {
            proxy_pass         http://vite_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }

    # ── Port 5006 → Flask backend API ────────────────────────────────
    server {
        listen 5006;
        server_name _;

        add_header X-Frame-Options      "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"  always;

        client_max_body_size 100M;

        location /static/ {
            alias   /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /uploads/ {
            alias   /app/uploads/;
            expires 7d;
        }

        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      16 8k;
        }
    }
}
