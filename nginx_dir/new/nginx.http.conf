# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/
#
# --- Certbot / TLS setup ---
# 1. Set server_name below to your real domain (replace mzansiserve.co.za).
# 2. Reload nginx so the HTTP server is active on port 80.
# 3. Run Certbot (choose one):
#    - Let Certbot edit nginx for you (recommended):
#       sudo certbot --nginx -d mzansiserve.co.za
#    - Or obtain cert only, then enable the HTTPS server block below yourself:
#      sudo certbot certonly --webroot -w /var/www/certbot -d mzansiserve.co.za
# 4. After certificates exist, uncomment the "server { listen 443 ssl ... }" block
#    below and set ssl_certificate / ssl_certificate_key to your cert paths, then
#    reload nginx.
# 5. Renewal: Certbot installs a cron/systemd timer; test with:
#    sudo certbot renew --dry-run

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 100M;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    include /etc/nginx/conf.d/*.conf;

    # Upstream for Flask/Gunicorn app running in Docker
    upstream mzansi_serve_app {
        server localhost:5006;
        # If running multiple instances, add more servers here:
        # server localhost:5001;
        # server localhost:5002;
    }

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  mzansiserve.co.za www.mzansiserve.co.za;

        # Certbot ACME challenge (for: certbot certonly --webroot -w /var/www/certbot)
        # Ensure directory exists: sudo mkdir -p /var/www/certbot
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Max upload size
        client_max_body_size 100M;

        # Proxy to Flask/Gunicorn app
        location / {
            proxy_pass http://mzansi_serve_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Static files (if served from host filesystem)
        # location /static/ {
        #     alias /path/to/your/app/static/;
        #     expires 30d;
        #     add_header Cache-Control "public, immutable";
        # }

        # Uploads (if served from host filesystem)
        # location /uploads/ {
        #     alias /path/to/your/app/uploads/;
        #     expires 7d;
        # }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }

    # HTTPS server: uncomment after running Certbot (see top-of-file instructions).
    # Certbot places certs under /etc/letsencrypt/live/<domain>/.
    #
    # server {
    #     listen       443 ssl http2;
    #     listen       [::]:443 ssl http2;
    #     server_name  mzansiserve.co.za www.mzansiserve.co.za;
    #
    #     ssl_certificate     /etc/letsencrypt/live/mzansiserve.co.za/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/mzansiserve.co.za/privkey.pem;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Max upload size
    #     client_max_body_size 100M;
    #
    #     # Proxy to Flask/Gunicorn app
    #     location / {
    #         proxy_pass http://mzansi_serve_app;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         
    #         proxy_connect_timeout 120s;
    #         proxy_send_timeout 120s;
    #         proxy_read_timeout 120s;
    #     }
    #
    #     error_page 404 /404.html;
    #     location = /404.html {
    #         internal;
    #     }
    #
    #     error_page 500 502 503 504 /50x.html;
    #     location = /50x.html {
    #         internal;
    #     }
    # }

}

