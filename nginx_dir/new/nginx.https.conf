# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/
#
# --- HTTPS config: serves TLS and redirects HTTP to HTTPS ---
# Prerequisites: Certbot / TLS setup (replace mzansiserve.co.za with your domain).
# 1. Get certificates, e.g.:
#      sudo certbot certonly --webroot -w /var/www/certbot -d mzansiserve.co.za
#    or: sudo certbot --nginx -d mzansiserve.co.za
# 2. Set server_name and ssl_certificate paths in both server blocks below.
# 3. Reload nginx. Renewal: sudo certbot renew --dry-run

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 100M;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    include /etc/nginx/conf.d/*.conf;

    # Upstream for Flask/Gunicorn app running in Docker
    upstream mzansi_serve_app {
        server localhost:5006;
        # If running multiple instances, add more servers here:
        # server localhost:5001;
        # server localhost:5002;
    }

    # HTTP: ACME challenge + redirect everything else to HTTPS
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  mzansiserve.co.za www.mzansiserve.co.za;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: main app
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  mzansiserve.co.za www.mzansiserve.co.za;

        ssl_certificate     /etc/letsencrypt/live/mzansiserve.co.za/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mzansiserve.co.za/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 100M;

        location / {
            proxy_pass http://mzansi_serve_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }

}

