{% extends "base.html" %}

{% block title %}Admin Login - MzansiServe{% endblock %}

{% block extra_head %}
<style>
    .admin-login-container {
        animation: fadeInFromTop 0.8s ease-out;
        max-width: 24rem;
    }
    
    @keyframes fadeInFromTop {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .admin-login-container .admin-badge {
        background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 admin-login-container">
    <div class="admin-badge">Admin Portal</div>
    <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
    <form id="adminLoginForm" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required 
                   class="w-full px-3 py-2 border rounded-md" autocomplete="username">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium mb-1">Password</label>
            <input type="password" id="password" name="password" required 
                   class="w-full px-3 py-2 border rounded-md" autocomplete="current-password">
        </div>
        <div>
            <button type="submit" class="w-full bg-slate-700 text-white py-2 rounded hover:bg-slate-800">
                Admin Login
            </button>
        </div>
    </form>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = {
        email: formData.get('email'),
        password: formData.get('password')
    };
    
    try {
        const response = await fetch('/api/auth/admin-login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
            localStorage.setItem('token', result.data.token);
            window.location.href = '/admin';
        } else {
            alert(result.error?.message || 'Login failed');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
