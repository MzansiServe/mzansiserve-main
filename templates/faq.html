{% extends "base.html" %}

{% block title %}FAQ - MzansiServe{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-16">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-4">
                Frequently Asked Questions
            </h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">
                Everything you need to know about MzansiServe. Can't find the answer you're looking for? <a
                    href="/contact" class="text-purple-600 hover:text-purple-800 font-medium hover:underline">Contact
                    our support team.</a>
            </p>
        </div>

        <div id="faqLoading" class="flex flex-col items-center justify-center py-20">
            <svg class="animate-spin h-10 w-10 text-purple-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="text-gray-500">Loading answers...</p>
        </div>

        <div id="faqError" class="hidden p-4 bg-red-50 text-red-700 rounded-xl mb-6 flex items-center">
            <svg class="h-5 w-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="faqErrorMessage"></span>
        </div>

        <div id="faqContainer" class="hidden space-y-4">
            <!-- FAQ Items injected here -->
        </div>

        <div id="faqEmpty" class="hidden text-center py-16 bg-white rounded-2xl border border-dashed border-gray-200">
            <svg class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                </path>
            </svg>
            <p class="text-gray-500 font-medium">No FAQs found.</p>
        </div>

    </div>
</div>

<script>
    async function loadFAQs() {
        const loadingEl = document.getElementById('faqLoading');
        const containerEl = document.getElementById('faqContainer');
        const emptyEl = document.getElementById('faqEmpty');
        const errorEl = document.getElementById('faqError');
        const errorMsgEl = document.getElementById('faqErrorMessage');

        try {
            // Simulate API delay for smoothness if local
            // await new Promise(r => setTimeout(r, 500));

            const response = await fetch('/api/faq');
            const result = await response.json();

            loadingEl.classList.add('hidden');

            if (result.success && result.data.faqs && result.data.faqs.length > 0) {
                containerEl.classList.remove('hidden');
                emptyEl.classList.add('hidden');
                errorEl.classList.add('hidden');

                containerEl.innerHTML = result.data.faqs.map((faq, index) => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                        <button onclick="toggleFAQ(${index})" class="w-full text-left px-6 py-5 focus:outline-none flex justify-between items-center group">
                            <span class="text-lg font-medium text-gray-900 group-hover:text-purple-700 transition-colors">${faq.question}</span>
                            <span id="icon-${index}" class="ml-4 flex-shrink-0 flex items-center justify-center h-8 w-8 rounded-full bg-gray-50 text-gray-400 group-hover:bg-purple-100 group-hover:text-purple-600 transition-all">
                                <svg class="h-5 w-5 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </span>
                        </button>
                        <div id="answer-${index}" class="hidden px-6 pb-6 pt-0 text-gray-600 border-t border-gray-50 mt-2">
                             <div class="prose prose-purple max-w-none pt-4">
                                <p>${faq.answer.replace(/\n/g, '<br>')}</p>
                            </div>
                        </div>
                    </div>
                `).join('');

            } else {
                containerEl.classList.add('hidden');
                emptyEl.classList.remove('hidden');
                errorEl.classList.add('hidden');
            }
        } catch (error) {
            console.error('Error loading FAQs:', error);
            loadingEl.classList.add('hidden');
            containerEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            errorMsgEl.textContent = 'Unable to load FAQs. Please check your connection and try again.';
        }
    }

    function toggleFAQ(index) {
        const answer = document.getElementById(`answer-${index}`);
        const icon = document.getElementById(`icon-${index}`).querySelector('svg');

        // Close others (optional - typical accordion behavior)
        document.querySelectorAll('[id^="answer-"]').forEach(el => {
            if (el.id !== `answer-${index}` && !el.classList.contains('hidden')) {
                el.classList.add('hidden');
                // Reset icon rotation for others
                const otherIcon = document.getElementById(`icon-${el.id.split('-')[1]}`).querySelector('svg');
                otherIcon.classList.remove('rotate-180');
            }
        });

        if (answer.classList.contains('hidden')) {
            answer.classList.remove('hidden');
            icon.classList.add('rotate-180');
        } else {
            answer.classList.add('hidden');
            icon.classList.remove('rotate-180');
        }
    }

    document.addEventListener('DOMContentLoaded', loadFAQs);
</script>
{% endblock %}
