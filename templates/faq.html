{% extends "base.html" %}

{% block title %}FAQ - MzansiServe{% endblock %}

{% block extra_head %}
<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .fade-in {
        animation: fadeIn 0.6s ease-out forwards;
    }
    
    .faq-item {
        transition: all 0.3s ease;
    }
    
    .faq-question {
        cursor: pointer;
        user-select: none;
    }
    
    .faq-answer {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
    }
    
    .faq-item.active .faq-answer {
        max-height: 1000px;
        transition: max-height 0.5s ease-in;
    }
    
    .faq-icon {
        transition: transform 0.3s ease;
    }
    
    .faq-item.active .faq-icon {
        transform: rotate(180deg);
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8 fade-in">
    <h1 class="text-4xl font-bold mb-2 text-center">Frequently Asked Questions</h1>
    <p class="text-gray-600 text-center mb-8">Find answers to common questions about MzansiServe</p>
    
    <div id="faqLoading" class="text-center py-12 text-gray-600">
        Loading FAQs...
    </div>
    
    <div id="faqContainer" class="space-y-4 hidden">
        <!-- FAQ items will be rendered here -->
    </div>
    
    <div id="faqEmpty" class="hidden text-center py-12">
        <p class="text-gray-600">No FAQs available at the moment.</p>
    </div>
    
    <div id="faqError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded mb-4">
        <p id="faqErrorMessage"></p>
    </div>
</div>

<script>
async function loadFAQs() {
    const loadingEl = document.getElementById('faqLoading');
    const containerEl = document.getElementById('faqContainer');
    const emptyEl = document.getElementById('faqEmpty');
    const errorEl = document.getElementById('faqError');
    const errorMsgEl = document.getElementById('faqErrorMessage');
    
    try {
        const response = await fetch('/api/faq');
        const result = await response.json();
        
        loadingEl.classList.add('hidden');
        
        if (result.success && result.data.faqs && result.data.faqs.length > 0) {
            containerEl.classList.remove('hidden');
            emptyEl.classList.add('hidden');
            errorEl.classList.add('hidden');
            
            containerEl.innerHTML = result.data.faqs.map((faq, index) => `
                <div class="faq-item bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="faq-question p-6 flex justify-between items-center hover:bg-gray-50" onclick="toggleFAQ(${index})">
                        <h3 class="text-lg font-semibold text-gray-900 pr-4">${faq.question}</h3>
                        <svg class="faq-icon w-6 h-6 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                    <div class="faq-answer">
                        <div class="px-6 pb-6 text-gray-700">
                            <p class="whitespace-pre-line">${faq.answer}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Store FAQ items for toggle functionality
            window.faqItems = result.data.faqs;
        } else {
            containerEl.classList.add('hidden');
            emptyEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
        }
    } catch (error) {
        console.error('Error loading FAQs:', error);
        loadingEl.classList.add('hidden');
        containerEl.classList.add('hidden');
        emptyEl.classList.add('hidden');
        errorEl.classList.remove('hidden');
        errorMsgEl.textContent = 'Error loading FAQs. Please try again later.';
    }
}

function toggleFAQ(index) {
    const faqItems = document.querySelectorAll('.faq-item');
    const clickedItem = faqItems[index];
    
    // Close all other items
    faqItems.forEach((item, i) => {
        if (i !== index) {
            item.classList.remove('active');
        }
    });
    
    // Toggle clicked item
    clickedItem.classList.toggle('active');
}

document.addEventListener('DOMContentLoaded', function() {
    loadFAQs();
});
</script>
{% endblock %}
