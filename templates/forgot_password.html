{% extends "base.html" %}

{% block title %}Forgot Password - MzansiServe{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <h2 class="text-2xl font-bold mb-4">Forgot Password</h2>
    <form id="forgotPasswordForm" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required 
                   class="w-full px-3 py-2 border rounded-md">
        </div>
        <div>
            <label for="role" class="block text-sm font-medium mb-1">Account role (optional)</label>
            <select id="role" name="role" class="w-full px-3 py-2 border rounded-md">
                <option value="">Any / First found</option>
                <option value="client">Client</option>
                <option value="driver">Driver</option>
                <option value="professional">Professional</option>
                <option value="service-provider">Service Provider</option>
            </select>
            <p class="text-sm text-gray-500 mt-1">If you have multiple accounts with this email, select the role to reset.</p>
        </div>
        <div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                Send Reset Link
            </button>
        </div>
    </form>
</div>
<script>
document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = { email: formData.get('email') };
    const role = formData.get('role');
    if (role) data.role = role;
    try {
        const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alert('If the email exists, a password reset link has been sent.');
        } else {
            alert(result.error?.message || 'Request failed');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
});
</script>
{% endblock %}
