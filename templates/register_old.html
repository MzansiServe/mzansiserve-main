{% extends "base.html" %}

{% block title %}Register - MzansiServe{% endblock %}

{% block extra_head %}
<style>
    .register-container {
        animation: fadeInFromTop 0.8s ease-out;
    }
    
    @keyframes fadeInFromTop {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 register-container">
    <h2 class="text-2xl font-bold mb-4">Register</h2>
    <form id="registerForm" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required 
                   class="w-full px-3 py-2 border rounded-md">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium mb-1">Password</label>
            <input type="password" id="password" name="password" required minlength="8"
                   class="w-full px-3 py-2 border rounded-md">
        </div>
        <div>
            <label for="role" class="block text-sm font-medium mb-1">Role</label>
            <select id="role" name="role" required 
                    class="w-full px-3 py-2 border rounded-md">
                <option value="">Select Role</option>
                <option value="client">Client</option>
                <option value="driver">Driver</option>
                <option value="professional">Professional</option>
                <option value="service-provider">Service Provider</option>
            </select>
        </div>
        <div>
            <label class="flex items-center">
                <input type="checkbox" id="terms" name="terms" required>
                <span class="ml-2">I have read and agree to <a href="/terms-of-use" class="text-blue-500 hover:underline">Terms of Use</a></span>
            </label>
        </div>
        <div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                Register
            </button>
        </div>
    </form>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);
    
    if (!data.terms) {
        alert('You must agree to the Terms of Use');
        return;
    }
    
    delete data.terms; // Remove checkbox from data
    
    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
            localStorage.setItem('token', result.data.token);
            window.location.href = '/profile';
        } else {
            alert(result.error?.message || 'Registration failed');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
