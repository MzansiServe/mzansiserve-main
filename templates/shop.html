{% extends "base.html" %}

{% block title %}Shop - MzansiServe{% endblock %}

{% block content %}
<div class="mt-8">
    <h2 class="text-2xl font-bold mb-4">Shop</h2>
    
    <!-- Search and Filters -->
    <div class="mb-6 space-y-4">
        <!-- Search Input -->
        <div>
            <label for="productSearch" class="block text-sm font-medium mb-2">Search Products:</label>
            <input type="text" id="productSearch" placeholder="Search by name or description..." 
                   class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <!-- Category Filter -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="categoryFilter" class="block text-sm font-medium mb-2">Filter by Category:</label>
                <select id="categoryFilter" class="w-full px-4 py-2 border rounded-md">
                    <option value="">All Categories</option>
                </select>
            </div>
            
            <!-- Subcategory Filter -->
            <div>
                <label for="subcategoryFilter" class="block text-sm font-medium mb-2">Filter by Subcategory:</label>
                <select id="subcategoryFilter" class="w-full px-4 py-2 border rounded-md" disabled>
                    <option value="">All Subcategories</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Products Grid -->
    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="col-span-full text-center py-8">Loading products...</div>
    </div>
    
    <!-- Pagination -->
    <div id="pagination" class="mt-8 flex justify-center space-x-2 hidden">
        <button id="prevPage" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Previous</button>
        <span id="pageInfo" class="px-4 py-2"></span>
        <button id="nextPage" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Next</button>
    </div>
</div>

<script>
let currentPage = 0;
const itemsPerPage = 9;
let selectedCategory = '';
let selectedSubcategory = '';
let searchQuery = '';
let searchTimeout = null;
let categoriesData = [];

// Load categories and subcategories
async function loadCategories() {
    try {
        const response = await fetch('/api/shop/categories');
        const result = await response.json();
        
        if (result.success) {
            categoriesData = result.data.categories || [];
            const filter = document.getElementById('categoryFilter');
            categoriesData.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.title;
                filter.appendChild(option);
            });
        }
    } catch (error) {
        console.error('Error loading categories:', error);
    }
}

// Load subcategories for selected category
async function loadSubcategories(categoryId) {
    const subcategoryFilter = document.getElementById('subcategoryFilter');
    
    if (!categoryId) {
        subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
        subcategoryFilter.disabled = true;
        return;
    }
    
    try {
        const response = await fetch(`/api/shop/subcategories?category_id=${categoryId}`);
        const result = await response.json();
        
        if (result.success) {
            subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
            result.data.subcategories.forEach(subcategory => {
                const option = document.createElement('option');
                option.value = subcategory.id;
                option.textContent = subcategory.title;
                subcategoryFilter.appendChild(option);
            });
            subcategoryFilter.disabled = false;
        }
    } catch (error) {
        console.error('Error loading subcategories:', error);
        subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
        subcategoryFilter.disabled = true;
    }
}

// Load products
async function loadProducts(page = 0) {
    try {
        const params = new URLSearchParams({
            limit: itemsPerPage,
            offset: page * itemsPerPage
        });
        
        if (selectedCategory) {
            params.append('category_id', selectedCategory);
        }
        
        if (selectedSubcategory) {
            params.append('subcategory_id', selectedSubcategory);
        }
        
        if (searchQuery && searchQuery.trim()) {
            params.append('search', searchQuery.trim());
        }
        
        const response = await fetch(`/api/shop/products?${params}`);
        const result = await response.json();
        
        if (result.success) {
            displayProducts(result.data.products);
            updatePagination(result.data.total, page);
        }
    } catch (error) {
        console.error('Error loading products:', error);
        document.getElementById('products').innerHTML = '<div class="col-span-full text-center py-8 text-red-600">Error loading products</div>';
    }
}

// Display products
function displayProducts(products) {
    const container = document.getElementById('products');
    
    if (products.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-8">No products found</div>';
        return;
    }
    
    container.innerHTML = products.map(product => `
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <a href="/shop/product/${product.id}" class="block cursor-pointer">
                ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}" class="w-full h-48 object-cover hover:opacity-90 transition-opacity">` : '<div class="w-full h-48 bg-gray-200"></div>'}
            </a>
            <div class="p-4">
                <a href="/shop/product/${product.id}" class="block">
                    <h3 class="text-lg font-semibold mb-2 hover:text-blue-600">${product.name}</h3>
                </a>
                <p class="text-gray-600 text-sm mb-2">${product.description || ''}</p>
                <p class="text-xl font-bold text-blue-600 mb-4">R${product.price.toFixed(2)}</p>
                ${product.in_stock ? 
                    `<button onclick="handleAddToCart('${product.id}', '${product.name.replace(/'/g, "\\'")}', ${product.price}, '${product.image_url || ''}')" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Add to Cart</button>` :
                    `<button disabled class="w-full bg-gray-300 text-gray-500 py-2 rounded cursor-not-allowed">Out of Stock</button>`
                }
            </div>
        </div>
    `).join('');
}

// Update pagination
function updatePagination(total, page) {
    const totalPages = Math.ceil(total / itemsPerPage);
    const pagination = document.getElementById('pagination');
    
    if (totalPages <= 1) {
        pagination.classList.add('hidden');
        return;
    }
    
    pagination.classList.remove('hidden');
    document.getElementById('pageInfo').textContent = `Page ${page + 1} of ${totalPages}`;
    
    document.getElementById('prevPage').disabled = page === 0;
    document.getElementById('nextPage').disabled = page >= totalPages - 1;
    
    document.getElementById('prevPage').onclick = () => {
        if (page > 0) {
            currentPage = page - 1;
            loadProducts(currentPage);
        }
    };
    
    document.getElementById('nextPage').onclick = () => {
        if (page < totalPages - 1) {
            currentPage = page + 1;
            loadProducts(currentPage);
        }
    };
}

// Handle add to cart
function handleAddToCart(productId, productName, productPrice, productImage) {
    if (typeof addToCart === 'function') {
        addToCart(productId, productName, productPrice, productImage, 1);
        alert(`${productName} added to cart!`);
    } else {
        alert(`Product ${productId} added to cart (cart functionality loading...)`);
    }
}

// Category filter change
document.getElementById('categoryFilter').addEventListener('change', function(e) {
    selectedCategory = e.target.value;
    selectedSubcategory = ''; // Reset subcategory when category changes
    currentPage = 0;
    loadSubcategories(selectedCategory);
    loadProducts(currentPage);
});

// Subcategory filter change
document.getElementById('subcategoryFilter').addEventListener('change', function(e) {
    selectedSubcategory = e.target.value;
    currentPage = 0;
    loadProducts(currentPage);
});

// Search input with debounce
document.getElementById('productSearch').addEventListener('input', function(e) {
    searchQuery = e.target.value;
    
    // Clear previous timeout
    if (searchTimeout) {
        clearTimeout(searchTimeout);
    }
    
    // Debounce search - wait 500ms after user stops typing
    searchTimeout = setTimeout(() => {
        currentPage = 0;
        loadProducts(currentPage);
    }, 500);
});

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    loadCategories();
    loadProducts(currentPage);
});
</script>
{% endblock %}
