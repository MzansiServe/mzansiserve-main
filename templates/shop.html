{% extends "base.html" %}

{% block title %}Marketplace - MzansiServe{% endblock %}

{% block content %}
<!-- Hero Section -->
<div class="relative bg-purple-900 h-64 sm:h-80 rounded-b-3xl overflow-hidden mb-12 shadow-xl">
    <img src="/static/images/banners/shop_banner.png" alt="Marketplace" class="w-full h-full object-cover opacity-50">
    <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-4xl sm:text-5xl font-extrabold text-white mb-4 tracking-tight">MzansiServe Marketplace</h1>
        <p class="text-xl text-purple-100 max-w-2xl">Discover local products and services in your community.</p>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Sidebar Filters -->
        <div class="w-full lg:w-64 flex-shrink-0 space-y-8">
            <!-- Search -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    Search
                </h3>
                <input type="text" id="productSearch" placeholder="Search products..."
                    class="w-full px-4 py-3 rounded-lg bg-gray-50 border-transparent focus:bg-white focus:border-purple-500 focus:ring-0 transition-all text-sm">
            </div>

            <!-- Categories -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    Categories
                </h3>
                <div class="space-y-3">
                    <select id="categoryFilter"
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                        <option value="">All Categories</option>
                    </select>

                    <select id="subcategoryFilter"
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 disabled:bg-gray-100 disabled:text-gray-400"
                        disabled>
                        <option value="">All Subcategories</option>
                    </select>
                </div>
            </div>

            <!-- Price Range (Visual Only Placeholder for future) -->
            <!-- <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-900 mb-4">Price Range</h3>
                <div class="flex items-center space-x-2">
                    <input type="number" placeholder="Min" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                    <span class="text-gray-400">-</span>
                    <input type="number" placeholder="Max" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                </div>
            </div> -->
        </div>

        <!-- Main Content -->
        <div class="flex-1">
            <!-- Toolbar -->
            <div
                class="flex flex-col sm:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <span id="resultCount" class="text-gray-500 text-sm mb-2 sm:mb-0">Showing products</span>
                <div class="flex items-center space-x-4">
                    <label class="text-sm text-gray-600">Sort by:</label>
                    <select
                        class="border-none bg-transparent text-sm font-semibold text-gray-900 focus:ring-0 cursor-pointer">
                        <option>Newest First</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                        <option>Popularity</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="col-span-full py-12 text-center">
                    <div
                        class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-purple-500 border-t-transparent">
                    </div>
                    <p class="mt-2 text-gray-500">Loading marketplace...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="mt-12 flex justify-center items-center space-x-4 hidden">
                <button id="prevPage"
                    class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-purple-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    &larr; Previous
                </button>
                <span id="pageInfo"
                    class="text-sm font-medium text-gray-700 bg-white px-4 py-2 rounded-lg border border-gray-200 shadow-sm"></span>
                <button id="nextPage"
                    class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-purple-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Next &rarr;
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 0;
    const itemsPerPage = 9;
    let selectedCategory = '';
    let selectedSubcategory = '';
    let searchQuery = '';
    let searchTimeout = null;
    let categoriesData = [];

    // Load categories and subcategories
    async function loadCategories() {
        try {
            const response = await fetch('/api/shop/categories');
            const result = await response.json();

            if (result.success) {
                categoriesData = result.data.categories || [];
                const filter = document.getElementById('categoryFilter');
                categoriesData.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.id;
                    option.textContent = category.title;
                    filter.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }

    // Load subcategories for selected category
    async function loadSubcategories(categoryId) {
        const subcategoryFilter = document.getElementById('subcategoryFilter');

        if (!categoryId) {
            subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
            subcategoryFilter.disabled = true;
            return;
        }

        try {
            const response = await fetch(`/api/shop/subcategories?category_id=${categoryId}`);
            const result = await response.json();

            if (result.success) {
                subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
                result.data.subcategories.forEach(subcategory => {
                    const option = document.createElement('option');
                    option.value = subcategory.id;
                    option.textContent = subcategory.title;
                    subcategoryFilter.appendChild(option);
                });
                subcategoryFilter.disabled = false;
            }
        } catch (error) {
            console.error('Error loading subcategories:', error);
            subcategoryFilter.innerHTML = '<option value="">All Subcategories</option>';
            subcategoryFilter.disabled = true;
        }
    }

    // Load products
    async function loadProducts(page = 0) {
        try {
            const container = document.getElementById('products');
            // container.innerHTML = '<div class="col-span-full text-center py-12"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-purple-500 border-t-transparent"></div></div>';

            const params = new URLSearchParams({
                limit: itemsPerPage,
                offset: page * itemsPerPage
            });

            if (selectedCategory) {
                params.append('category_id', selectedCategory);
            }

            if (selectedSubcategory) {
                params.append('subcategory_id', selectedSubcategory);
            }

            if (searchQuery && searchQuery.trim()) {
                params.append('search', searchQuery.trim());
            }

            const response = await fetch(`/api/shop/products?${params}`);
            const result = await response.json();

            if (result.success) {
                displayProducts(result.data.products);
                updatePagination(result.data.total, page);

                // Update result count
                const start = page * itemsPerPage + 1;
                const end = Math.min((page + 1) * itemsPerPage, result.data.total);
                document.getElementById('resultCount').textContent = result.data.total > 0
                    ? `Showing ${start}-${end} of ${result.data.total} products`
                    : 'No products found';
            }
        } catch (error) {
            console.error('Error loading products:', error);
            document.getElementById('products').innerHTML = `
            <div class="col-span-full text-center py-12">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">Error loading products</h3>
                <p class="mt-1 text-sm text-gray-500">Please try again later.</p>
            </div>`;
        }
    }

    // Display products
    function displayProducts(products) {
        const container = document.getElementById('products');

        if (products.length === 0) {
            container.innerHTML = `
            <div class="col-span-full text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No products found</h3>
                <p class="mt-1 text-sm text-gray-500">Try adjusting your search criteria.</p>
            </div>`;
            return;
        }

        container.innerHTML = products.map(product => `
        <div class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col h-full">
            <a href="/shop/product/${product.id}" class="block relative aspect-w-4 aspect-h-3 overflow-hidden bg-gray-100">
                ${product.image_url
                ? `<img src="${product.image_url}" alt="${product.name}" class="w-full h-48 object-cover transform group-hover:scale-105 transition-transform duration-500">`
                : `<div class="w-full h-48 bg-gray-100 flex items-center justify-center text-gray-400">
                        <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                       </div>`
            }
                ${!product.in_stock ? '<div class="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded">Out of Stock</div>' : ''}
            </a>
            <div class="p-5 flex-1 flex flex-col">
                <div class="flex-1">
                    <a href="/shop/product/${product.id}">
                        <h3 class="text-lg font-bold text-gray-900 mb-1 line-clamp-1 hover:text-purple-600 transition-colors">${product.name}</h3>
                    </a>
                    <p class="text-gray-500 text-sm mb-3 line-clamp-2">${product.description || 'No description available'}</p>
                </div>
                
                <div class="mt-4 pt-4 border-t border-gray-50 flex items-center justify-between">
                    <span class="text-xl font-extrabold text-purple-600">R${product.price ? product.price.toFixed(2) : '0.00'}</span>
                    
                    ${product.in_stock ?
                `<button onclick="handleAddToCart('${product.id}', '${product.name.replace(/'/g, "\\'")}', ${product.price}, '${product.image_url || ''}')" 
                                class="p-2 bg-purple-100 text-purple-600 rounded-lg hover:bg-purple-600 hover:text-white transition-colors shadow-sm" title="Add to Cart">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </button>` :
                `<button disabled class="p-2 bg-gray-100 text-gray-400 rounded-lg cursor-not-allowed">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                        </button>`
            }
                </div>
            </div>
        </div>
    `).join('');
    }

    // Update pagination
    function updatePagination(total, page) {
        const totalPages = Math.ceil(total / itemsPerPage);
        const pagination = document.getElementById('pagination');

        if (totalPages <= 1) {
            pagination.classList.add('hidden');
            return;
        }

        pagination.classList.remove('hidden');
        document.getElementById('pageInfo').textContent = `Page ${page + 1} of ${totalPages}`;

        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');

        prevBtn.disabled = page === 0;
        nextBtn.disabled = page >= totalPages - 1;

        prevBtn.onclick = () => {
            if (page > 0) {
                currentPage = page - 1;
                loadProducts(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        nextBtn.onclick = () => {
            if (page < totalPages - 1) {
                currentPage = page + 1;
                loadProducts(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
    }

    // Handle add to cart
    function handleAddToCart(productId, productName, productPrice, productImage) {
        // Add animation to the button or show a toast
        if (typeof addToCart === 'function') {
            addToCart(productId, productName, productPrice, productImage, 1);

            // Simple toast notification could be added here
            // For now using the existing behavior but we could enhance it
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center';
            toast.innerHTML = `
            <svg class="w-5 h-5 text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <div>
                <p class="font-bold">Added to Cart</p>
                <p class="text-sm text-gray-300">${productName}</p>
            </div>
        `;
            document.body.appendChild(toast);

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-20', 'opacity-0');
            });

            // Animate out
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);

        } else {
            alert(`Product ${productId} added to cart`);
        }
    }

    // Category filter change
    document.getElementById('categoryFilter').addEventListener('change', function (e) {
        selectedCategory = e.target.value;
        selectedSubcategory = ''; // Reset subcategory when category changes
        currentPage = 0;
        loadSubcategories(selectedCategory);
        loadProducts(currentPage);
    });

    // Subcategory filter change
    document.getElementById('subcategoryFilter').addEventListener('change', function (e) {
        selectedSubcategory = e.target.value;
        currentPage = 0;
        loadProducts(currentPage);
    });

    // Search input with debounce
    document.getElementById('productSearch').addEventListener('input', function (e) {
        searchQuery = e.target.value;

        // Clear previous timeout
        if (searchTimeout) {
            clearTimeout(searchTimeout);
        }

        // Debounce search - wait 500ms after user stops typing
        searchTimeout = setTimeout(() => {
            currentPage = 0;
            loadProducts(currentPage);
        }, 500);
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', function () {
        loadCategories();
        loadProducts(currentPage);
    });
</script>
{% endblock %}
